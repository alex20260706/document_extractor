name: zebra-document-extractor-dev

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    init: true
    environment:
      APP_ENV: development
      MAX_UPLOAD_MB: 10
      CORS_ORIGINS: http://localhost:4200
      WATCHFILES_FORCE_POLLING: "true"
      LLM_ENABLED: ${LLM_ENABLED:-true}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      LLM_MAX_INPUT_CHARACTERS: ${LLM_MAX_INPUT_CHARACTERS:-60000}
      LLM_MAX_OUTPUT_TOKENS: ${LLM_MAX_OUTPUT_TOKENS:-2500}
      LLM_STRICT_SCHEMA: ${LLM_STRICT_SCHEMA:-false}
    volumes:
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    init: true
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "4200:4200"

volumes:
  frontend_node_modules:
