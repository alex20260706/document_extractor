<section class="upload-card" aria-labelledby="upload-title">
  <div class="configuration">
    <div class="section-label">
      <span>01</span>
      <p>CONFIGURE EXTRACTION</p>
    </div>
    <h2 id="upload-title">What kind of document is this?</h2>
    <p class="support">Selecting the type routes the file to the correct extraction strategy.</p>

    <label class="type-label" for="document-type">Document type</label>
    <div class="select-shell">
      <select
        id="document-type"
        required
        [disabled]="busy()"
        (change)="onDocumentTypeChange($event)"
      >
        <option value="">Select a document type</option>
        <option value="invoice">Invoice</option>
        <option value="purchase_order">Purchase order</option>
        <option value="delivery_note" disabled>Delivery note — Coming soon</option>
        <option value="work_report" disabled>Work report — Coming soon</option>
        <option value="maintenance_report" disabled>Maintenance report — Coming soon</option>
      </select>
      <svg aria-hidden="true" viewBox="0 0 20 20">
        <path d="m6 8 4 4 4-4" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" />
      </svg>
    </div>

    <div class="privacy-note">
      <svg aria-hidden="true" viewBox="0 0 24 24">
        <path d="M7 10V8a5 5 0 0 1 10 0v2m-9 0h8a2 2 0 0 1 2 2v7H6v-7a2 2 0 0 1 2-2Z" fill="none" stroke="currentColor" stroke-width="1.7" />
      </svg>
      <span>
        Files are not stored by this application. When AI enrichment is
        configured, extracted text may be sent to the configured provider.
      </span>
    </div>
  </div>

  <label
    class="drop-zone"
    [class.dragging]="dragging()"
    [class.disabled]="uploadDisabled()"
    (dragover)="onDragOver($event)"
    (dragleave)="dragging.set(false)"
    (drop)="onDrop($event)"
  >
    <input
      type="file"
      [disabled]="uploadDisabled()"
      accept="application/pdf,image/bmp,image/jpeg,image/png,image/tiff,image/webp,.pdf,.bmp,.jpeg,.jpg,.png,.tif,.tiff,.webp"
      (change)="onFileInput($event)"
    >
    <span class="upload-icon" aria-hidden="true">
      @if (busy()) {
        <span class="mini-spinner"></span>
      } @else {
        <svg viewBox="0 0 32 32">
          <path d="M16 21V7m0 0-5 5m5-5 5 5M8 18v6h16v-6" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" />
        </svg>
      }
    </span>
    <span class="drop-title">{{ dropTitle() }}</span>
    <span class="drop-copy">
      {{ selectedDocumentType() ? 'Drag and drop, or ' : 'Choose a type to unlock upload' }}
      @if (selectedDocumentType() && !busy()) { <strong>browse files</strong> }
    </span>
    <span class="formats">PDF, JPG, PNG, TIFF, BMP or WEBP · Maximum 10 MB</span>
  </label>
</section>
